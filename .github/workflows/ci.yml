name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for committed secrets
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz gitleaks
          # Scan the tracked tree only (a clean export) — never .git history or
          # node_modules — so the gate fails on newly committed secrets without
          # tripping over pre-existing findings in old history.
          mkdir -p /tmp/treescan
          git archive HEAD | tar -x -C /tmp/treescan
          ./gitleaks dir /tmp/treescan --no-banner --redact --exit-code 1

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      # Placeholder values — the build only constructs Supabase clients, it does
      # not need a reachable database (storefront pages fall back to static data).
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_SITE_URL: https://tmfoodstuff.ae
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
